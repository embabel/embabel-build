name: Notify on Recovery

on:
  workflow_call:
    inputs:
      branch:
        description: 'Branch to check recovery on'
        required: false
        type: string
        default: 'main'
    secrets:
      DISCORD_WEBHOOK_URL:
        required: false

jobs:
  check-recovery:
    runs-on: ubuntu-latest
    outputs:
      is-recovery: ${{ steps.check.outputs.is-recovery }}
    steps:
      - name: Check if previous build failed
        id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Resolve the numeric workflow ID from the current run
            // so we never need a hardcoded filename — works in any repo
            const currentRun = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });

            const workflowId = currentRun.data.workflow_id;
            console.log(`Resolved workflow_id: ${workflowId}`);

            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              branch: '${{ inputs.branch }}',
              exclude_pull_requests: true,
              per_page: 5
            });

            const previousRun = runs.data.workflow_runs
              .filter(run => run.id !== context.runId && run.status === 'completed')
              .at(0);

            const wasFailure = previousRun?.conclusion === 'failure';
            console.log(`Previous run conclusion: ${previousRun?.conclusion ?? 'none found'}`);
            core.setOutput('is-recovery', String(wasFailure));

  notify-recovery:
    needs: [check-recovery]
    if: needs.check-recovery.outputs.is-recovery == 'true'
    uses: embabel/embabel-build/.github/workflows/discord-notify.yml@main
    with:
      message: '✅ Build recovered'
    secrets: inherit
