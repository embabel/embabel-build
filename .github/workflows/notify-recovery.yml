name: Notify on Recovery

on:
  workflow_call:
    inputs:
      branch:
        description: 'Branch to check recovery on'
        required: false
        type: string
        default: 'main'
      caller_run_id:
        description: 'github.run_id from the calling workflow — used to resolve the correct workflow history'
        required: true
        type: string
    secrets:
      DISCORD_WEBHOOK_URL:
        required: false

jobs:
  check-recovery:
    runs-on: ubuntu-latest
    outputs:
      is-recovery: ${{ steps.check.outputs.is-recovery }}
    steps:
      - name: Check if previous build failed
        id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Use the caller's run_id (passed explicitly) to resolve the correct
            // repo and workflow — context.runId here would point at the reusable
            // workflow's own run, not the caller's build run
            const callerRunId = parseInt('${{ inputs.caller_run_id }}');

            const currentRun = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: callerRunId
            });

            const workflowId = currentRun.data.workflow_id;
            const callerRepo = currentRun.data.repository.full_name;
            console.log(`Caller repo: ${callerRepo}, workflow_id: ${workflowId}`);

            const [owner, repo] = callerRepo.split('/');

            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflowId,
              branch: '${{ inputs.branch }}',
              exclude_pull_requests: true,
              per_page: 5
            });

            const previousRun = runs.data.workflow_runs
              .filter(run => run.id !== callerRunId && run.status === 'completed')
              .at(0);

            const wasFailure = previousRun?.conclusion === 'failure';
            console.log(`Previous run conclusion: ${previousRun?.conclusion ?? 'none found'}`);
            core.setOutput('is-recovery', String(wasFailure));

  notify-recovery:
    needs: [check-recovery]
    if: needs.check-recovery.outputs.is-recovery == 'true'
    uses: embabel/embabel-build/.github/workflows/discord-notify.yml@main
    with:
      message: '✅ Build recovered'
    secrets: inherit
