name: Discord Notification

on:
  workflow_call:
    inputs:
      message:
        description: 'Message prefix to send to Discord'
        type: string
        required: false
        default: '❌ Build failed'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content": "${{ inputs.message }}: ${{ github.repository }} (${{ github.ref_name }})\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
